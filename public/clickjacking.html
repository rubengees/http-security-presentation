<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        padding: 0.75rem;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 0.85rem;
        margin: 0;
      }

      h3 {
        margin: 0 0 0.75rem;
        font-size: 0.875rem;
        color: #94a3b8;
        font-weight: 600;
      }

      button {
        background: #ef4444;
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        cursor: pointer;
      }

      button:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <h3>Bankkonto</h3>
    <button>Transfer all money</button>
  </body>
</html>
