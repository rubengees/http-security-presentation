<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        padding: 0.75rem;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 0.85rem;
        margin: 0;
      }

      .search-bar {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-bottom: 0.6rem;
        color: #94a3b8;
        font-size: 0.8rem;
      }

      .search-bar input {
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 0.25rem;
        color: #e2e8f0;
        font-size: 0.8rem;
        padding: 0.2rem 0.4rem;
        width: 10rem;
      }

      .card {
        background: #334155;
        border-radius: 0.375rem;
        padding: 0.4rem 0.65rem;
        margin: 0.3rem 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      h3 {
        margin: 0 0 0.4rem;
        font-size: 0.875rem;
        color: #94a3b8;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h3>Produktsuche</h3>
    <div class="search-bar">
      <input id="search-input" type="search" />
    </div>
    <p class="results-label">3 Ergebnisse gefunden</p>
    <div class="card">
      <span class="card-title">Laptop</span>
    </div>
    <div class="card">
      <span class="card-title">Maus</span>
    </div>
    <div class="card">
      <span class="card-title">Tastatur</span>
    </div>
    <script src="/eval.js"></script>
  </body>
</html>
