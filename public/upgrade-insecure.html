<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        padding: 0.75rem;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 0.85rem;
        margin: 0;
      }

      img {
        border-radius: 0.375rem;
        display: block;
        margin-bottom: 0.6rem;
      }

      h3 {
        margin: 0 0 0.4rem;
        font-size: 0.875rem;
        color: #94a3b8;
        font-weight: 600;
      }

      pre {
        background: #334155;
        border-radius: 0.375rem;
        padding: 0.4rem 0.65rem;
        margin: 0.3rem 0;
        font-size: 0.75rem;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }
    </style>
  </head>
  <body>
    <h3>Image</h3>
    <img src="http://picsum.photos/seed/a/200/100" alt="Demo Image" width="200" height="100" />

    <h3>Fetch</h3>
    <pre>fetch("http://jsonplaceholder.typicode.com/posts/1")</pre>
    <pre id="result"></pre>

    <script>
      fetch("http://jsonplaceholder.typicode.com/posts/1")
        .then((response) => response.text())
        .then((result) => {
          document.getElementById("result").textContent = result
        })
        .catch((err) => {
          document.getElementById("result").textContent = String(err)
        })
    </script>
  </body>
</html>
